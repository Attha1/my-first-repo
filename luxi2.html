<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxi te amo mucho</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Dancing Script', cursive;
    }

    /* Canvas for shooting stars */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Center message */
    .center {
      position: relative;
      z-index: 10;
      text-align: center;
      animation: fadein 2s ease forwards;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .center .luxi {
      font-size: 5rem;
      color: #fff;
      text-shadow: 0 0 30px #ffffffaa, 0 0 60px #aad4ff88;
      letter-spacing: 4px;
      display: block;
      animation: shimmer 3s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      from { text-shadow: 0 0 20px #fff, 0 0 40px #aad4ff; }
      to   { text-shadow: 0 0 40px #fff, 0 0 80px #aad4ff, 0 0 120px #6ec6ff55; }
    }

    .center .msg {
      font-size: 2.4rem;
      color: #cce8ff;
      text-shadow: 0 0 20px #6ec6ff;
      letter-spacing: 2px;
      display: block;
      margin-top: 0.4rem;
      animation: shimmer2 3s ease-in-out infinite alternate;
    }

    @keyframes shimmer2 {
      from { text-shadow: 0 0 10px #6ec6ff; }
      to   { text-shadow: 0 0 30px #6ec6ff, 0 0 60px #aad4ff88; }
    }

    .center .heart {
      display: block;
      font-size: 2rem;
      margin-top: 1rem;
      animation: heartbeat 1.2s ease-in-out infinite;
      color: #ff4d6d;
      text-shadow: 0 0 20px #ff4d6d;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <canvas id="sky"></canvas>

  <div class="center">
    <span class="luxi">Luxi</span>
    <span class="msg">te amo mucho</span>
    <span class="heart">&#10084; &#10084; &#10084;</span>
  </div>

  <script>
    const canvas = document.getElementById('sky');
    const ctx = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Static background stars
    const bgStars = Array.from({ length: 200 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleDir: Math.random() > 0.5 ? 1 : -1,
    }));

    // Shooting stars
    class ShootingStar {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x  = Math.random() * W;
        this.y  = initial ? Math.random() * H : -20;
        this.len     = 120 + Math.random() * 180;
        this.speed   = 8 + Math.random() * 10;
        this.angle   = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
        this.alpha   = 0;
        this.fade    = 'in';
        this.trail   = [];
        this.color   = Math.random() > 0.3 ? '#ffffff' : (Math.random() > 0.5 ? '#aad4ff' : '#ffe8aa');
        this.thickness = 1 + Math.random() * 1.5;
      }
      update() {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 20) this.trail.shift();

        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        if (this.fade === 'in')  { this.alpha = Math.min(1, this.alpha + 0.06); if (this.alpha >= 1) this.fade = 'out'; }
        if (this.fade === 'out') { this.alpha = Math.max(0, this.alpha - 0.03); }

        if (this.alpha <= 0 && this.fade === 'out') this.reset();
        if (this.x > W + 100 || this.y > H + 100) this.reset();
      }
      draw() {
        if (this.trail.length < 2) return;
        ctx.save();
        for (let i = 1; i < this.trail.length; i++) {
          const t = i / this.trail.length;
          ctx.beginPath();
          ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
          ctx.lineTo(this.trail[i].x, this.trail[i].y);
          ctx.strokeStyle = this.color;
          ctx.globalAlpha = t * this.alpha;
          ctx.lineWidth = t * this.thickness;
          ctx.lineCap = 'round';
          ctx.stroke();
        }
        // Bright head
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.thickness, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = this.alpha;
        ctx.fill();
        ctx.restore();
      }
    }

    const stars = Array.from({ length: 12 }, () => new ShootingStar());

    let tick = 0;
    function loop() {
      ctx.clearRect(0, 0, W, H);

      // Draw background stars with twinkle
      tick += 0.01;
      for (const s of bgStars) {
        s.a += s.twinkleSpeed * s.twinkleDir;
        if (s.a > 0.9 || s.a < 0.1) s.twinkleDir *= -1;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = s.a;
        ctx.fill();
      }

      // Draw shooting stars
      for (const s of stars) {
        s.update();
        s.draw();
      }

      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
